version: "3.8"

###############################################
# Tallman-LMS - Docker Compose Development
# Unified Frontend + Backend on port 3000
# (For local Docker Desktop testing)
###############################################

services:
  tallman:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: tallman-lms:dev
    container_name: tallman-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_PATH=/data/tallman.db
      - VITE_API_URL=http://localhost:3000
      - UPLOAD_DIR=/app/uploads
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./server:/app/server
      - /app/node_modules
      - db-data:/data
      - uploads-data:/app/uploads
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  db-data:
  uploads-data:
