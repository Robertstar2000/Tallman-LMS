services:
  # TALLMAN API NEXUS: Unified Front & Backend
  # Single Port: 3000 (Master Gateway)
  tallman:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tallman-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/tallman.db
      - SEED_MODE=blank
      - VITE_API_URL=http://localhost:3000
      - UPLOAD_DIR=/app/uploads
    volumes:
      - db-data:/data
      - uploads-data:/app/uploads
    networks:
      - tallman-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  db-data:
  uploads-data:

networks:
  tallman-network:
    driver: bridge
