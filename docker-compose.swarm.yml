version: "3.8"

###############################################
# Tallman-LMS - Docker Swarm Production Stack  
# Unified Frontend + Backend served on port 3000
###############################################

networks:
  traefik:
    external: true
    name: infra_traefik
  tallman-internal:
    driver: overlay
    attachable: true

services:
  tallman:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: tallman-lms:latest
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/tallman.db
      - VITE_API_URL=https://lms.tallmanequipment.com
      - UPLOAD_DIR=/app/uploads
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - /var/data/tallman-lms/data:/data
      - /var/data/tallman-lms/uploads:/app/uploads
    networks:
      - traefik
      - tallman-internal
    deploy:
      mode: replicated
      # SQLite remains a single-writer datastore, so keep the service at one replica
      # until the stack is migrated to a shared database.
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 60s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.25"
      labels:
        - "traefik.enable=true"

        # Standard HTTPS route for the LMS
        - "traefik.http.routers.tallman.rule=Host(`lms.tallmanequipment.com`)"
        - "traefik.http.routers.tallman.entrypoints=https"
        - "traefik.http.routers.tallman.tls=true"
        - "traefik.http.routers.tallman.tls.certresolver=letsencrypt"
        - "traefik.http.routers.tallman.service=tallman"

        # Optional public port 3000 router (if Traefik has entrypoint web3000)
        - "traefik.http.routers.tallman-3000.rule=Host(`lms.tallmanequipment.com`)"
        - "traefik.http.routers.tallman-3000.entrypoints=web3000"
        - "traefik.http.routers.tallman-3000.tls=true"
        - "traefik.http.routers.tallman-3000.tls.certresolver=letsencrypt"
        - "traefik.http.routers.tallman-3000.service=tallman"

        # Container internal port served by the unified image
        - "traefik.http.services.tallman.loadbalancer.server.port=3000"

        # Sticky sessions
        - "traefik.http.services.tallman.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.tallman.loadbalancer.sticky.cookie.name=tallman_session"

        # Ensure Traefik routes on the external overlay network
        - "traefik.swarm.network=infra_traefik"

        # Health check for Traefik
        - "traefik.http.services.tallman.loadbalancer.healthcheck.path=/"
        - "traefik.http.services.tallman.loadbalancer.healthcheck.interval=30s"
        - "traefik.http.services.tallman.loadbalancer.healthcheck.timeout=10s"

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  # NOTE: host path is used above; declare a named volume if you prefer managed volumes
  db-data: {}

